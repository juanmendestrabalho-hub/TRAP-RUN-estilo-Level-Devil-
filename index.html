<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Trap Run</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="menu" id="menu">
  <h1>NEON TRAP ENGINE</h1>
  <p>press START to enter simulation</p>
  <button onclick="startGame()">START</button>

      <div id="msg"></div>
    
</div>


  <!-- GAME AREA -->
  <div id="game">

    <!-- PLAYER -->
    <div id="player"></div>

    <!-- GOAL -->
    <div id="goal"></div>

    <!-- CHECKPOINTS -->
    <div class="checkpoint" style="left: 350px; bottom: 40px;"></div>

    <!-- PLATFORMS -->
    <div class="platform" style="left:0; bottom:0; width:100%"></div>

    <div class="platform" style="left:150px; bottom:120px; width:120px"></div>

    <div class="platform fake" style="left:320px; bottom:200px; width:120px"></div>

    <div class="platform" style="left:500px; bottom:80px; width:150px"></div>

    <!-- SPIKES -->
    <div class="spike" style="left:200px; bottom:0;"></div>

    <!-- FUTURO: CONTAINER DE INIMIGOS (JS usa array, mas ajuda organização) -->
    <div id="enemies"></div>

    <!-- FUTURO: OVERLAY (efeitos de morte / transição) -->
    <div id="overlay"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
