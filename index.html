<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Trap Run</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="ui">
    <h1>⚡ NEON TRAP RUN</h1>
    <p>chegue ao portal... se conseguir 😈</p>
    <button onclick="startGame()">START</button>
    <div id="msg"></div>
  </div>

  <div id="game">

    <div id="player"></div>

    <div id="goal"></div>

    <!-- plataformas -->
    <div class="platform" style="left:0; bottom:0; width:100%"></div>
    <div class="platform" style="left:150px; bottom:120px; width:120px"></div>
    <div class="platform fake" style="left:320px; bottom:200px; width:120px"></div>
    <div class="platform" style="left:500px; bottom:80px; width:150px"></div>

    <!-- spikes escondidos -->
    <div class="spike" style="left:200px; bottom:0;"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
